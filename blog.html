<script>
const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
function updateTheme() {
  if (mediaQuery.matches) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
}
updateTheme();
mediaQuery.addEventListener('change', updateTheme);
</script>

<style>
  .blog-hero {
    padding: 10rem 3rem 4rem;
    text-align: center; z-index: 1; position: relative;
    background: var(--bg); transition: background 0.4s;
  }
  .blog-hero h1 { font-size: clamp(2.5rem,5vw,4.5rem); font-weight:700; letter-spacing:-0.04em; margin-bottom:0.6rem; }
  .blog-hero p  { color: var(--mid); font-size:1rem; max-width:440px; margin:0 auto; line-height:1.7; }

  #posts-container {
    max-width: 720px; margin: 0 auto;
    padding: 0 2rem 6rem; display:flex; flex-direction:column; gap:2rem;
    position: relative; z-index:1;
  }

  .post-card {
    background: var(--code-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    box-shadow: var(--nm-out);
    overflow: hidden;
    transition: background 0.4s, box-shadow 0.4s, border-color 0.4s, transform 0.25s;
  }
  .post-card:hover { transform: translateY(-3px); }

  .post-header {
    background: var(--surface);
    padding: 0.6rem 1.2rem;
    border-bottom: 1px solid var(--tab-border);
    display: flex; align-items: center; gap: 0.5rem;
    transition: background 0.4s, border-color 0.4s;
  }
  .post-header-dots { display:flex; gap:5px; margin-right:auto; }
  .post-date {
    font-family: var(--font-mono); font-size:0.7rem; color:var(--dim);
    cursor:default;
  }

  #date-tooltip {
    position: fixed; z-index: 9999; pointer-events: none;
    background: var(--ink); color: var(--bg);
    font-family: var(--font-mono); font-size: 0.68rem;
    padding: 0.3rem 0.75rem; border-radius: 7px;
    white-space: nowrap; opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  #date-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink);
  }

  .post-body { padding: 1.8rem 2rem; }
  .post-title { font-size:1.25rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:1rem; }
  .post-text { color:var(--mid); line-height:1.8; font-size:0.95rem; }
  .post-text b  { color:var(--ink); font-weight:600; }
  .post-text i  { font-style:italic; }
  .mono-inline {
    font-family: var(--font-mono); font-style:italic;
    background: rgba(92,92,232,0.09); color:var(--code-kw);
    padding:0.1em 0.4em; border-radius:5px;
    font-size:0.88em;
  }
  html.dark .mono-inline { background: rgba(180,160,255,0.12); }

  .post-slider {
    margin-top: 1.4rem;
    position: relative; border-radius:12px; overflow:hidden;
    background: var(--surface);
  }
  .slider-track { display:flex; transition:transform 0.35s cubic-bezier(0.4,0,0.2,1); }
  .slider-img {
    min-width:100%; max-height:360px; object-fit: contain;
    background: black;
    display:block;
  }
  .slider-btn {
    position:absolute; top:50%; transform:translateY(-50%);
    background: var(--glass-bg); backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);
    box-shadow:0 2px 12px var(--glass-shadow), inset 0 1px 0 var(--glass-shine);
    color:var(--ink); width:36px; height:36px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size:0.9rem;
    transition:background 0.2s;
    z-index:2;
  }
  .slider-btn:hover { background:var(--glass-hover-bg); }
  .slider-prev { left:10px; }
  .slider-next { right:10px; }
  .slider-dots {
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; gap:5px;
  }
  .slider-dot {
    width:6px; height:6px; border-radius:50%;
    background:rgba(255,255,255,0.5); cursor:pointer;
    transition:background 0.2s, transform 0.2s;
  }
  .slider-dot.active { background:#fff; transform:scale(1.3); }

  .blog-empty {
    text-align:center; padding:4rem 2rem;
    color:var(--dim); font-family:var(--font-mono); font-size:0.85rem;
  }
</style>

<div class="blog-hero reveal">
  <p class="section-eyebrow">Devlog</p>
  <h1>Blog</h1>
  <p>Updates, thoughts, and technical deep-dives on Helion Engine and VR development.</p>

<div id="posts-container"></div>

<footer>Coder Cube &nbsp;·&nbsp; Helion Engine &nbsp;·&nbsp; © 2026</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   BLOG POSTS
   Fields:
     date:   "M/D/YY"  e.g. "4/25/26"
     title:  string
     body:   string - supports <b>, <i>, <m>text</m>
     images: [] array of image file paths (leave empty if none)
═══════════════════════════════════════════════════════════ */
const BLOG_POSTS = [
  {
    date: "4/26/26",
    title: "Helion Engine - First Devlog",
    body: "This is the first official devlog for <b>Helion Engine</b>. This project started on the first of this year as a question: <i>what if we stopped treating standalone VR hardware as a limitation and started treating it as a design constraint?</i>\n\nThe core idea is to build everything - rendering, audio, physics - with that constraint in mind from <b>day one</b>. Not a desktop engine ported down. Something <b>built for it</b>.\n\nMore technical details coming soon.",
    images: ["uploads/HelionLogo.png"]
  },
  {
    date: "4/27/26",
    title: "Technical Details",
    body: "The engine I'm building aims to push VR forward in a meaningful way.\n\nMany current VR experiences rely on low-detail visuals and minimal design effort. I want to take a different approach.\n\nThe Helion Engine is intended to deliver high-quality visuals, gameplay systems, interactions, and audio. Achieving that will require significant time and effort. At the moment, the project consists of a Unity <m>ScriptableRendererFeature</m> with a moderately capable renderer, along with a method to run it independently of Unity.\n\nMy immediate priority is completing the lighting system. After that, I plan to expand the engine itself, as many of the features I have in mind depend on the ray tracing capabilities used in the renderer. One of the main challenges will be optimizing ray tracing to run efficiently on hardware like the Quest 2, but I can work that out after enough time. I attached images showing what I have so far captured on the Quest 2 at lowest settings.",
    images: ["uploads/1-1.png", "uploads/1-2.png", "uploads/1-3.png", "uploads/1-4.png", "uploads/1-5.png"]
  },
  {
    date: "5/6/26",
    title: "Transitioning Away From Voxels",
    body: "The long wait (for me at least) has finally ended. Voxels have been left behind. \n\nVoxel ray traversal has been <b><i>ditched.</i></b>\n\n My original plan was to use transformation functions to bend the ray to simulate geometry, but I have fully abandoned that. Introducing: SDFs! \n\n (Please be suportive I had to rewrite <b><i>EVERYTHING</i></b> except lighting for this)",
    images: ["uploads/2-1.png"]
  },
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function compactDate(str) { return str; }

function fullDate(str) {
  const parts = str.split('/');
  const m = parseInt(parts[0]), d = parseInt(parts[1]), y = parseInt(parts[2]);
  const fullYear = y < 100 ? 2000 + y : y;
  return `${MONTHS[m-1]} ${ordinal(d)}, ${fullYear}`;
}

function parseBody(text) {
  // Replace <m>...</m> with styled span, then newlines with <br>
  return text
    .replace(/<m>([\s\S]*?)<\/m>/g, '<span class="mono-inline">$1</span>')
    .replace(/\n/g, '<br>');
}

function buildSlider(images, cardIndex) {
  if (!images || images.length === 0) return '';
  let imgs = images.map(src => `<img class="slider-img" src="${src}" alt="Post image" />`).join('');
  let dots = images.map((_,i) => `<div class="slider-dot${i===0?' active':''}" data-index="${i}"></div>`).join('');
  let prevBtn = images.length > 1 ? `<button class="slider-btn slider-prev" data-card="${cardIndex}">&#8249;</button>` : '';
  let nextBtn = images.length > 1 ? `<button class="slider-btn slider-next" data-card="${cardIndex}">&#8250;</button>` : '';
  let dotsHtml = images.length > 1 ? `<div class="slider-dots" data-card="${cardIndex}">${dots}</div>` : '';
  return `<div class="post-slider" data-slider="${cardIndex}" data-count="${images.length}">
    <div class="slider-track">${imgs}</div>
    ${prevBtn}${nextBtn}${dotsHtml}
  </div>`;
}

function renderPosts() {
  const container = document.getElementById('posts-container');
  if (!BLOG_POSTS.length) {
    container.innerHTML = '<div class="blog-empty">// no posts yet</div>';
    return;
  }

  // Newest first
  const sorted = [...BLOG_POSTS].reverse();

  container.innerHTML = sorted.map((post, i) => `
    <div class="post-card reveal">
      <div class="post-header">
        <div class="post-header-dots">
          <div class="code-dot" style="background:#ff5f57;width:8px;height:8px"></div>
          <div class="code-dot" style="background:#febc2e;width:8px;height:8px"></div>
          <div class="code-dot" style="background:#28c840;width:8px;height:8px"></div>
        </div>
        <div class="post-date" data-fulldate="${fullDate(post.date)}">
          ${post.date}
        </div>
      </div>
      <div class="post-body">
        <div class="post-title">${post.title}</div>
        <div class="post-text">${parseBody(post.body)}</div>
        ${buildSlider(post.images, i)}
      </div>
    </div>
  `).join('');

  // Wire up sliders
  document.querySelectorAll('[data-slider]').forEach(sliderEl => {
    const idx = parseInt(sliderEl.dataset.slider);
    const count = parseInt(sliderEl.dataset.count);
    const track = sliderEl.querySelector('.slider-track');
    const dotsEl = sliderEl.querySelector('.slider-dots');
    let current = 0;

    function goTo(n) {
      current = (n + count) % count;
      track.style.transform = `translateX(-${current * 100}%)`;
      if (dotsEl) {
        dotsEl.querySelectorAll('.slider-dot').forEach((d,i) => d.classList.toggle('active', i===current));
      }
    }

    const prev = sliderEl.querySelector('.slider-prev');
    const next = sliderEl.querySelector('.slider-next');
    if (prev) prev.addEventListener('click', () => goTo(current - 1));
    if (next) next.addEventListener('click', () => goTo(current + 1));
    if (dotsEl) dotsEl.querySelectorAll('.slider-dot').forEach((d,i) => d.addEventListener('click', () => goTo(i)));
  });

  // Reveal new elements
  document.querySelectorAll('.reveal').forEach(r => io.observe(r));
}

// Scroll reveal
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); io.unobserve(e.target); }});
}, {threshold:0.08});

renderPosts();

//Floating date tooltip
const tooltip = document.createElement('div');
tooltip.id = 'date-tooltip';
document.body.appendChild(tooltip);

document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-fulldate]');
  if (!el) return;
  tooltip.textContent = el.dataset.fulldate;
  tooltip.style.opacity = '1';
});
document.addEventListener('mousemove', e => {
  const el = e.target.closest('[data-fulldate]');
  if (!el) { tooltip.style.opacity = '0'; return; }
  const r = el.getBoundingClientRect();
  tooltip.style.left = (r.left + r.width / 2 - tooltip.offsetWidth / 2) + 'px';
  tooltip.style.top  = (r.top - tooltip.offsetHeight - 8) + 'px';
});
document.addEventListener('mouseout', e => {
  if (!e.target.closest('[data-fulldate]')) tooltip.style.opacity = '0';
});

const canvas = document.getElementById('canvas-bg');
const ctx = canvas.getContext('2d');
let W, H, pts = [];
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
for(let i=0;i<30;i++) pts.push({ x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.12, vy:(Math.random()-.5)*.12, r:Math.random()*.9+.3, a:Math.random()*.15+.04 });
(function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(92,92,232,${p.a})`; ctx.fill();
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
  });
  requestAnimationFrame(draw);
})();
</script>
</body>
